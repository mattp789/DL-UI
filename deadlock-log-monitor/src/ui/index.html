<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Log Monitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Deadlock Log Monitor</h1>
            <p>Real-time monitoring of creep camp events</p>
        </header>

        <div class="status-bar">
            <span id="status">Monitoring logs...</span>
            <span id="last-update">Last update: --:--:--</span>
        </div>

        <div class="controls">
            <button id="refresh-btn">Refresh Data</button>
            <button id="clear-btn">Clear Logs</button>
        </div>

        <div class="logs-container">
            <h2>Camp Events</h2>
            <div id="camp-events" class="events-list"></div>
        </div>

        <div class="log-content">
            <h2>Recent Log Activity</h2>
            <pre id="log-output">No log data available...</pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
